function syncSaveAnalise(dadosAnalise, fornecedores) {
  if (!db) return;
  db.collection('analise').doc('dados').set({
    dados: dadosAnalise,
    fornecedores: fornecedores,
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  }).catch(console.error);
}

function syncSaveFornecedores(fornecedoresData) {
  if (!db) return;
  db.collection('fornecedores').doc('lista').set({
    data: fornecedoresData,
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  }).catch(console.error);
}

function syncSaveSC(scDataArray) {
  if (!db) return;
  db.collection('sc').doc('lista').set({
    data: scDataArray,
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  }).catch(console.error);
}

function syncSavePedidos(pedidosArray) {
  if (!db) return;
  db.collection('pedidos').doc('lista').set({
    data: pedidosArray,
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  }).catch(console.error);
}

function loadFromFirebase() {
  // Análise
  db.collection('analise').doc('dados').onSnapshot(doc => {
    if (doc.exists && doc.data().dados) {
      dados = doc.data().dados;
      if (typeof renderizarTabela === 'function') renderizarTabela();
      if (typeof atualizarKPIs === 'function') atualizarKPIs();
      toast('🔄 Dados de cotação sincronizados!');
    }
  }, err => console.warn('Erro snapshot análise:', err));
  
  // Fornecedores
  db.collection('fornecedores').doc('lista').onSnapshot(doc => {
    if (doc.exists && doc.data().data) {
      fornecedoresData = doc.data().data;
      if (typeof salvarStorage === 'function') salvarStorage();
      if (document.getElementById('tab-fornecedores')?.style.display !== 'none') {
        if (typeof renderTabelaFornecedores === 'function') renderTabelaFornecedores();
      }
    }
  }, err => console.warn('Erro snapshot fornecedores:', err));
  
  // SC
  db.collection('sc').doc('lista').onSnapshot(doc => {
    if (doc.exists && doc.data().data) {
      scData = doc.data().data;
      localStorage.setItem('petra_sc', JSON.stringify(scData));
      if (document.getElementById('tab-sc')?.style.display !== 'none') {
        if (typeof renderSC === 'function') renderSC();
      }
    }
  }, err => console.warn('Erro snapshot SC:', err));
  
  // Pedidos
  db.collection('pedidos').doc('lista').onSnapshot(doc => {
    if (doc.exists && doc.data().data) {
      pedidosData = doc.data().data;
      localStorage.setItem('petra_pedidos', JSON.stringify(pedidosData));
      if (document.getElementById('tab-pedidos')?.style.display !== 'none') {
        if (typeof renderPedidos === 'function') renderPedidos();
      }
    }
  }, err => console.warn('Erro snapshot pedidos:', err));
  
  toast('✅ Firebase conectado — sincronização em tempo real ativa');
}

// Chamar ao carregar a página
document.addEventListener('DOMContentLoaded', () => {
  loadFromFirebase();
});
</script>

/* ═══════════════════════════════════════════════════════════════
   RESPONSIVIDADE MOBILE - Adicionado para suportar celular
   ═══════════════════════════════════════════════════════════════ */

@media (max-width: 1024px) {
  /* MOBILE: Ajustar espaçamento */
  header { padding: 10px 16px; min-height: 60px; }
  .header-title { font-size: 1.1rem; }
  .header-center { padding: 0 20px; }
  nav { gap: 8px; }
  .nav-item { padding: 8px 14px; font-size: 0.75rem; }
  .main { padding: 16px; }
}

@media (max-width: 768px) {
  /* TABLET/MOBILE: Ajustar ainda mais */
  header { 
    padding: 8px 12px; 
    min-height: 56px;
    flex-wrap: wrap;
  }
  .header-title { font-size: 1rem; letter-spacing: 1px; }
  .header-center { padding: 0; }
  .header-right { display: none; }
  nav { 
    gap: 6px; 
    width: 100%;
    overflow-x: auto;
    padding: 8px 0;
  }
  .nav-item { 
    padding: 6px 12px; 
    font-size: 0.7rem;
    flex-shrink: 0;
  }
  .main { padding: 12px; }
  .import-zone { padding: 20px; }
  .btn { padding: 8px 16px; font-size: 0.75rem; }
  .hero { padding: 24px 16px; gap: 16px; }
  .hero-title { font-size: 1.4rem; }
  .step { padding: 8px 12px; font-size: 0.75rem; }
  table { min-width: 100%; font-size: 0.7rem; }
  thead th { padding: 6px 4px; font-size: 0.65rem; }
  tbody td { padding: 6px 4px; font-size: 0.7rem; }
}

@media (max-width: 480px) {
  /* MOBILE PEQUENO: Otimização máxima */
  header { 
    padding: 6px 8px;
    min-height: 50px;
  }
  .header-title { font-size: 0.95rem; }
  nav { 
    gap: 4px;
    justify-content: flex-start;
    padding: 6px;
  }
  .nav-item { 
    padding: 4px 10px; 
    font-size: 0.65rem;
    white-space: nowrap;
  }
  .main { padding: 8px; }
  .import-zone { padding: 16px; }
  .btn { padding: 6px 12px; font-size: 0.7rem; }
  .hero { padding: 16px 12px; gap: 12px; }
  .hero-title { font-size: 1.2rem; }
  .step { padding: 6px 10px; font-size: 0.7rem; }
  table { min-width: 100%; font-size: 0.65rem; }
  thead th { padding: 4px 3px; font-size: 0.6rem; }
  tbody td { padding: 4px 3px; font-size: 0.65rem; }
  .statusbar { gap: 12px; padding: 0 12px; font-size: 0.65rem; }
}

/* Menu Mobile com scroll horizontal */
@media (max-width: 768px) {
  nav {
    display: flex;
    overflow-x: auto;
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
  }
  nav::-webkit-scrollbar {
    height: 4px;
  }
  nav::-webkit-scrollbar-track {
    background: transparent;
  }
  nav::-webkit-scrollbar-thumb {
    background: rgba(47, 129, 247, 0.3);
    border-radius: 2px;
  }
  nav::-webkit-scrollbar-thumb:hover {
    background: rgba(47, 129, 247, 0.5);
  }
}

/* ═══════════════════════════════════════
   MOBILE APP SHELL — bottom nav
   ═══════════════════════════════════════ */
@media (max-width:768px){
  /* Hide desktop header completely */
  header { display:none !important; }
  .statusbar { display:none !important; }

  /* All tab content pushed below topbar */
  #tab-home,#tab-analise,#tab-fatmin,#tab-fornecedores,
  #tab-pedidos,#tab-sc,#tab-abordagens,#tab-diesel {
    padding-top: calc(54px + env(safe-area-inset-top,0px));
  }

  /* main padding account for bottom nav */
  .main { padding: 14px 12px calc(72px + env(safe-area-inset-bottom,0px)) !important; }

  /* quick controls above bottom nav */
  #quick-controls { bottom: calc(68px + env(safe-area-inset-bottom,0px)) !important; right:10px !important; }

  /* responsive grids */
  #forn-analise-grid{grid-template-columns:1fr !important}
  .fca{font-size:.9rem}
  .kpi-row,.pc-kpi-row{grid-template-columns:repeat(2,1fr) !important}
  .table-outer{font-size:.65rem}
  table{min-width:800px}
  .fatmin-grid{grid-template-columns:1fr !important}
  .just-grid{grid-template-columns:1fr !important}
}
@media (max-width:480px){
  .kpi-row,.pc-kpi-row{grid-template-columns:repeat(2,1fr) !important}
}

.mob-topbar {
